apiVersion: v2
name: aerostore
description: |
  A Helm chart for the AeroStore application — packages the backend
  Deployment, Service, HPA, and ConfigMap into a single versioned release.

  This chart replaces the individual kubectl apply commands previously used
  to manage k8s/basics/*.yaml files. With Helm, the entire application is
  installed, upgraded, and rolled back as a single atomic release.

  Supports three environment configurations out of the box:
    - values-dev.yaml     → development  (1 replica, no HPA, debug logging)
    - values-staging.yaml → staging      (2 replicas, HPA on, info logging)
    - values-prod.yaml    → production   (5 replicas, HPA on, warn logging)

  Includes values schema validation (values.schema.json) to catch
  misconfigured values before they reach the cluster.

type: application

# Chart version — bump whenever the chart structure or templates change
# Follows SemVer: MAJOR.MINOR.PATCH
version: 0.2.0

# Application version — the Docker image tag being deployed by default
appVersion: "1.17.0"

maintainers:
  - name: AeroStore DevOps
    email: devops@aerostore.example.com

keywords:
  - nginx
  - web
  - aerostore
