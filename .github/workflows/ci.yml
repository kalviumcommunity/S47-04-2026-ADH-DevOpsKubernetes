# .github/workflows/ci.yml
#
# AeroStore — Continuous Integration: Build, Test, and Docker Image Creation
#
# PIPELINE STRUCTURE (gates enforce order):
#
#   push / pull_request
#         │
#         ├── backend-build  ──────────────────┐
#         │   (install + syntax check)         │
#         │         │                          │
#         ├── backend-test ──────────────────► ├── docker-build
#         │   (runs AFTER backend-build)       │   (runs ONLY after ALL above pass)
#         │                                    │
#         └── frontend-build ─────────────────►┘
#             (install + vite build)
#
# WHY THIS ORDERING MATTERS:
#   Docker images are deployable artifacts — once pushed to a registry, any
#   downstream system (staging, production, a teammate's environment) can pull
#   and run them. Allowing a Docker image to be created from untested or
#   broken code is the root cause of "it worked in CI but broke in production"
#   incidents. The pipeline enforces: code must build AND pass tests before
#   it can become a container image.
#
# FAILURE BEHAVIOR:
#   - If backend-build fails → backend-test and docker-build are SKIPPED
#   - If backend-test fails  → docker-build is SKIPPED
#   - If frontend-build fails → docker-build is SKIPPED
#   - Only if ALL three gates pass → docker-build runs
#   - CI status is reported on the PR — merge is blocked until green

name: AeroStore CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # STAGE 1a: Backend Build
  # Install dependencies and validate the code can be parsed without errors.
  # Runs FIRST — if the build fails, tests don't even start (no wasted time).
  # ═══════════════════════════════════════════════════════════════════════
  backend-build:
    name: "Backend — Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      # npm ci guarantees a reproducible, lockfile-exact install.
      # Fails if package-lock.json is out of sync — catches dependency drift.
      - name: Install dependencies (npm ci)
        run: npm ci

      # node --check parses the file without executing it.
      # Catches: syntax errors, invalid require() calls, malformed JSON imports.
      - name: Syntax check (node --check)
        run: npm run check

      # Verify the data file the API depends on is valid JSON
      - name: Validate products.json
        run: node -e "require('./products.json'); console.log('✅ products.json is valid JSON');"

  # ═══════════════════════════════════════════════════════════════════════
  # STAGE 1b: Backend Test
  # Runs the automated test suite. Requires backend-build to pass first.
  # This is the gate that prevents broken code from reaching Docker.
  # ═══════════════════════════════════════════════════════════════════════
  backend-test:
    name: "Backend — Test"
    runs-on: ubuntu-latest
    needs: backend-build    # Only runs if build passed
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies (npm ci)
        run: npm ci

      # Run the full test suite using Node.js built-in test runner.
      # Tests cover: data integrity, module loading, business logic.
      # If ANY test fails → this step exits non-zero → job fails →
      # docker-build is skipped. A broken test == no Docker image.
      - name: Run test suite (npm test)
        run: npm test

      # Integration-level smoke test: start the actual HTTP server and
      # confirm it responds to a real HTTP request. This validates the
      # runtime layer that unit tests cannot cover (port binding, middleware).
      - name: Smoke test — server starts and serves HTTP
        run: |
          node index.js > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          for i in $(seq 1 10); do
            sleep 1
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Server ready after ${i}s — HTTP $HTTP_STATUS"
              break
            fi
            echo "  Waiting... attempt $i (HTTP $HTTP_STATUS)"
          done
          kill $SERVER_PID 2>/dev/null || true
          echo "--- Server log ---"
          cat /tmp/server.log || true
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Smoke test failed — server returned $HTTP_STATUS"
            exit 1
          fi

  # ═══════════════════════════════════════════════════════════════════════
  # STAGE 1c: Frontend Build
  # Install dependencies and build the Vite/React production bundle.
  # Runs in parallel with backend stages for speed.
  # ═══════════════════════════════════════════════════════════════════════
  frontend-build:
    name: "Frontend — Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (npm ci)
        run: npm ci

      # vite build compiles all JSX, resolves all imports, tree-shakes.
      # Catches: missing components, invalid imports, JSX syntax errors.
      # If this fails → no deployable frontend exists → no Docker image needed.
      - name: Build production bundle (vite build)
        run: npm run build

      # Confirm the build produced actual output. A build that exits 0
      # but writes no files is a silent failure.
      - name: Verify build artifacts
        run: |
          if [ ! -f dist/index.html ]; then
            echo "❌ Build failed — dist/index.html not found"
            exit 1
          fi
          echo "✅ Build artifacts verified"
          ls -lah dist/

  # ═══════════════════════════════════════════════════════════════════════
  # STAGE 2: Docker Image Build
  # THE GATE: Only runs if backend-test AND frontend-build both pass.
  # This is the critical enforcement point:
  #   failing tests → no Docker image
  #   broken build  → no Docker image
  # ═══════════════════════════════════════════════════════════════════════
  docker-build:
    name: "Docker — Build Images (gated)"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]   # BOTH must pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build backend image.
      # push: false — this is CI validation, not a registry push.
      # CD (Continuous Deployment) handles registry push after CI passes.
      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: aerostore-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build frontend image.
      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: aerostore-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Print a clear summary of what passed and what artifact was created.
      - name: Pipeline summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║         AeroStore CI Pipeline — All Stages Passed    ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  ✅ Backend build   — dependencies installed         ║"
          echo "║  ✅ Backend tests   — all test cases passed          ║"
          echo "║  ✅ Backend smoke   — HTTP server responds           ║"
          echo "║  ✅ Frontend build  — vite bundle created            ║"
          echo "║  ✅ Docker images   — built from verified code       ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  Commit:  ${{ github.sha }}"
          echo "║  Branch:  ${{ github.ref_name }}"
          echo "║  Event:   ${{ github.event_name }}"
          echo "╚══════════════════════════════════════════════════════╝"
