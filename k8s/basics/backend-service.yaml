# k8s/basics/backend-service.yaml
#
# ClusterIP Service for the AeroStore backend.
#
# PURPOSE — Service Discovery:
#   Instead of hardcoding a Pod IP (which changes every time a Pod restarts),
#   any component inside the cluster can reach the backend using the stable
#   DNS name: http://aerostore-backend-service
#
#   Kubernetes CoreDNS automatically resolves this name to the Service's
#   stable ClusterIP, which then load-balances across all healthy backend Pods.
#
# FULL DNS NAME (auto-generated by Kubernetes):
#   aerostore-backend-service.default.svc.cluster.local
#
# TYPE — ClusterIP:
#   ClusterIP is internal-only. It is not accessible from outside the cluster.
#   This is the correct type for Pod-to-Pod / Pod-to-Service communication
#   inside the cluster. External traffic uses the frontend NodePort Service.

apiVersion: v1
kind: Service
metadata:
  name: aerostore-backend-service
  labels:
    app: backend
spec:
  # ClusterIP = internal cluster access only (correct for service discovery)
  type: ClusterIP

  # This selector tells the Service which Pods to route traffic to.
  # Any Pod with the label "app: backend" will receive traffic from this Service.
  selector:
    app: backend

  ports:
    - name: http
      port: 3001        # Port the Service listens on (used in DNS-based calls)
      targetPort: 3001  # Port the backend container actually listens on
      protocol: TCP
