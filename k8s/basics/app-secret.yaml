# k8s/basics/app-secret.yaml
#
# Secret: aerostore-db-secret
#
# PURPOSE:
#   Stores sensitive credentials that the backend needs to connect to the
#   database. These values are NEVER hardcoded in source code or Dockerfiles.
#   They are injected into the Pod as environment variables at startup.
#
# IMPORTANT — How Secrets Work:
#   Secret values in this file are base64-encoded (NOT encrypted).
#   Base64 encoding is for safe transport in YAML — it is not security.
#   Real security comes from:
#     1. Kubernetes RBAC — restricting who can read Secrets in the cluster
#     2. Encryption at rest — enabling etcd encryption (cluster-level)
#     3. Never committing real credentials to Git (use placeholders here)
#
# ⚠️  THIS FILE CONTAINS PLACEHOLDER VALUES ONLY.
#   In a real project, actual secrets are injected via:
#     - A secrets manager (HashiCorp Vault, AWS Secrets Manager)
#     - CI/CD pipeline environment variables (GitHub Actions Secrets)
#     - Sealed Secrets / External Secrets Operator
#   Real credentials must NEVER be committed to Git.
#
# HOW TO GENERATE base64 VALUES:
#   echo -n "your-actual-value" | base64
#
# Placeholder values decoded:
#   DB_HOST:     db-host-placeholder
#   DB_USER:     aerostore_user
#   DB_PASSWORD: changeme
#   DB_NAME:     aerostore_db
#   DB_PORT:     5432
#
# CONSUMPTION:
#   Referenced in backend-deployment.yaml using:
#     envFrom:
#       - secretRef:
#           name: aerostore-db-secret

apiVersion: v1
kind: Secret
metadata:
  name: aerostore-db-secret
  labels:
    app: aerostore
    component: secrets
# Opaque is the default type for arbitrary key-value secrets
type: Opaque
data:
  # All values are base64-encoded placeholders
  # Replace with: echo -n "real-value" | base64
  DB_HOST:     ZGItaG9zdC1wbGFjZWhvbGRlcg==
  DB_USER:     YWVyb3N0b3JlX3VzZXI=
  DB_PASSWORD: Y2hhbmdlbWU=
  DB_NAME:     YWVyb3N0b3JlX2Ri
  DB_PORT:     NTQzMg==
