# k8s/rbac/serviceaccounts.yaml
#
# ServiceAccounts for RBAC binding
#
# WHY SERVICE ACCOUNTS:
#   A ServiceAccount is a Kubernetes identity for processes (not humans).
#   When a Pod runs, it uses a ServiceAccount's credentials to talk to the
#   Kubernetes API. RoleBindings attach permissions to a ServiceAccount.
#
#   In real teams:
#   - Human developers authenticate with OIDC/certificates (e.g., Google Auth for GKE)
#   - Automated processes (CI/CD pipelines, monitoring agents) use ServiceAccounts
#   - This demo uses ServiceAccounts for portability (works in any cluster without OIDC)

---
# Developer ServiceAccount — bound to dev-viewer Role (read-only)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aerostore-dev-sa
  namespace: dev-team
  labels:
    team: developers
    role: viewer

---
# CI/CD ServiceAccount — bound to cicd-deployer Role (deploy-only)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aerostore-cicd-sa
  namespace: dev-team
  labels:
    team: platform
    role: deployer
